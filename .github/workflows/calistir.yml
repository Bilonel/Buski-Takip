name: BUSKI Kesinti Kontrol Sistemi

on:
  schedule:
    - cron: '30 5 * * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    
    # GitHub'ın kodları depoya geri yazabilmesi için gerekli izin yetkisi
    permissions:
      contents: write
      
    steps:
    - name: Depodaki Kodları Çek
      uses: actions/checkout@v4

    - name: Python Kurulumunu Hazırla
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Gerekli Kütüphaneleri Yükle
      run: |
        pip install -r requirements.txt

    - name: Scripti Çalıştır
      run: python main.py

    # EĞER HAFIZA DOSYASI GÜNCELLENDİYSE GITHUB'A GERİ YÜKLE (COMMIT & PUSH)
    - name: Hafızayı GitHub Deposuna Kaydet
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        git add kesinti_hafizasi.txt || true
        git commit -m "Kalıcı hafıza güncellendi [skip ci]" || echo "Değişiklik yok."
        git push origin main || echo "Push edilecek yeni veri yok."
